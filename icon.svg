<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC4DFF"/>
      <stop offset="100%" stop-color="#9945FF"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="248" fill="url(#g1)" opacity="0.06"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#g1)" stroke-width="4" opacity="0.3"/>

  <!-- Hexagon -->
  <polygon points="256,70 372,138 372,268 256,336 140,268 140,138" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.8"/>
  <polygon points="256,90 356,150 356,256 256,316 156,256 156,150" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Neural connections -->
  <g opacity="0.5">
    <line x1="256" y1="130" x2="190" y2="210" stroke="#14F195" stroke-width="2"/>
    <line x1="256" y1="130" x2="322" y2="210" stroke="#9945FF" stroke-width="2"/>
    <line x1="190" y1="210" x2="256" y2="300" stroke="#14F195" stroke-width="2"/>
    <line x1="322" y1="210" x2="256" y2="300" stroke="#9945FF" stroke-width="2"/>
    <line x1="190" y1="210" x2="322" y2="210" stroke="#EC4DFF" stroke-width="1.5" opacity="0.3"/>
    <line x1="256" y1="130" x2="256" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  </g>

  <!-- Data bars -->
  <rect x="220" y="190" width="18" height="80" rx="3" fill="url(#g1)" filter="url(#glow)"/>
  <rect x="247" y="160" width="18" height="110" rx="3" fill="url(#g2)" filter="url(#glow)"/>
  <rect x="274" y="175" width="18" height="95" rx="3" fill="url(#g1)" filter="url(#glow)"/>

  <!-- Line overlay -->
  <path d="M220 180 Q233 170 247 160 Q263 195 274 175 Q286 168 292 172" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.6" stroke-linecap="round"/>

  <!-- Center glow -->
  <circle cx="256" cy="215" r="35" fill="url(#g1)" opacity="0.12" filter="url(#glowStrong)"/>

  <!-- Nodes -->
  <circle cx="256" cy="130" r="5" fill="#14F195" filter="url(#glow)"/>
  <circle cx="190" cy="210" r="5" fill="#14F195" filter="url(#glow)"/>
  <circle cx="322" cy="210" r="5" fill="#9945FF" filter="url(#glow)"/>
  <circle cx="256" cy="300" r="5" fill="#EC4DFF" filter="url(#glow)"/>

  <!-- Small decorative dots -->
  <circle cx="140" cy="100" r="2.5" fill="#14F195" opacity="0.3"/>
  <circle cx="372" cy="100" r="2.5" fill="#9945FF" opacity="0.3"/>
  <circle cx="140" cy="340" r="2.5" fill="#EC4DFF" opacity="0.3"/>
  <circle cx="372" cy="340" r="2.5" fill="#14F195" opacity="0.3"/>

  <!-- Bottom USDC label -->
  <text x="256" y="440" font-family="'Inter',-apple-system,sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.12)" text-anchor="middle" letter-spacing="6">API</text>
</svg>
