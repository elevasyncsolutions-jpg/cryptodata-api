<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC4DFF"/>
      <stop offset="100%" stop-color="#9945FF"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon area -->
  <g transform="translate(40, 20)">
    <!-- Outer hexagon -->
    <polygon points="100,0 186,54 186,160 100,214 14,160 14,54" fill="url(#g3)" stroke="url(#g1)" stroke-width="3" opacity="0.9"/>
    <polygon points="100,10 178,60 178,154 100,204 22,154 22,60" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Neural network nodes and connections inside hex -->
    <g opacity="0.6">
      <line x1="100" y1="45" x2="60" y2="95" stroke="#14F195" stroke-width="1.5"/>
      <line x1="100" y1="45" x2="140" y2="95" stroke="#9945FF" stroke-width="1.5"/>
      <line x1="60" y1="95" x2="100" y2="145" stroke="#14F195" stroke-width="1.5"/>
      <line x1="140" y1="95" x2="100" y2="145" stroke="#9945FF" stroke-width="1.5"/>
      <line x1="60" y1="95" x2="140" y2="95" stroke="#EC4DFF" stroke-width="1" opacity="0.4"/>
      <line x1="100" y1="45" x2="100" y2="145" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    </g>

    <!-- Central data bars (chart) -->
    <rect x="82" y="85" width="10" height="45" rx="2" fill="url(#g1)" filter="url(#glow)"/>
    <rect x="97" y="65" width="10" height="65" rx="2" fill="url(#g2)" filter="url(#glow)"/>
    <rect x="112" y="75" width="10" height="55" rx="2" fill="url(#g1)" filter="url(#glow)"/>

    <!-- Top line chart -->
    <path d="M82 83 Q90 77 97 65 Q107 90 112 75 Q118 68 122 70" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.7" stroke-linecap="round"/>

    <!-- Center node glow -->
    <circle cx="100" cy="95" r="20" fill="url(#g1)" opacity="0.15" filter="url(#glowStrong)"/>

    <!-- Nodes -->
    <circle cx="100" cy="45" r="4" fill="#14F195" filter="url(#glow)"/>
    <circle cx="60" cy="95" r="4" fill="#14F195" filter="url(#glow)"/>
    <circle cx="140" cy="95" r="4" fill="#9945FF" filter="url(#glow)"/>
    <circle cx="100" cy="145" r="4" fill="#EC4DFF" filter="url(#glow)"/>

    <!-- Data flow arrows -->
    <path d="M55 120 L45 130 L55 140" fill="none" stroke="#14F195" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round"/>
    <path d="M145 120 L155 130 L145 140" fill="none" stroke="#9945FF" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round"/>

    <!-- Small hex decoration dots -->
    <circle cx="30" cy="30" r="2" fill="#14F195" opacity="0.3"/>
    <circle cx="170" cy="30" r="2" fill="#9945FF" opacity="0.3"/>
    <circle cx="30" cy="185" r="2" fill="#EC4DFF" opacity="0.3"/>
    <circle cx="170" cy="185" r="2" fill="#14F195" opacity="0.3"/>
  </g>

  <!-- Text area -->
  <g transform="translate(270, 65)">
    <!-- CRYPTODATA -->
    <text x="0" y="0" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="3">
      CRYPTODATA
      <tspan fill="url(#g1)">.</tspan>
    </text>

    <!-- Tagline -->
    <text x="2" y="40" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.4)" letter-spacing="1">
      AI AGENT API · PAY-AS-YOU-GO · SOLANA USDC
    </text>

    <!-- MCP badge -->
    <rect x="2" y="55" width="52" height="22" rx="11" fill="url(#g1)" opacity="0.2"/>
    <text x="28" y="71" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="#14F195" text-anchor="middle">MCP</text>

    <rect x="60" y="55" width="58" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
    <text x="89" y="71" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">21 TOOLS</text>

    <rect x="124" y="55" width="68" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
    <text x="158" y="71" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle">$1 USDC</text>
  </g>
</svg>
